<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Shopping Cart — Zambian Marketplace</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="container">
      <header class="page-header">
        <div class="brand">
          <a href="index.html"><img src="assets/logo.png" class="logo-img" alt="Zambian Marketplace" /></a>
          <div>
            <h1 class="page-title">Shopping Cart</h1>
            <p class="page-description">Review items, update quantities, and proceed to checkout.</p>
          </div>
        </div>
        <nav class="header-nav">
          <a href="index.html">Home</a>
          <a href="shop.html">Shop</a>
          <a href="seller.html">Seller Dashboard</a>
          <a href="chat.html">Chat</a>
          <a href="login.html" data-action="logout">Logout</a>
        </nav>
      </header>

      <section class="card">
        <div id="cart-summary"></div>
        <div id="cart-status" class="status-message" aria-live="polite"></div>
      </section>

      <section class="card" style="margin-top: 1.5rem;">
        <h2>Your items</h2>
        <div id="cart-items" class="grid" style="margin-top: 1rem;"></div>
      </section>

      <footer class="footer-note">
        Adjust quantities and pickup details before placing your order.
      </footer>
    </div>
    <script src="app.js"></script>
  </body>
</html>
