<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Login | Zambian Marketplace</title>
<meta name="description" content="Log in to your Zambian Marketplace account to manage orders, chat, and shop." />

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>

/* ---------- Design tokens (shared with register.html) ---------- */
:root{
    --color-primary-900: #0B3D24;
    --color-primary-700: #145C36;
    --color-primary-500: #1F7A4D;
    --color-accent-500:  #C97A2B;
    --color-accent-600:  #B06A22;
    --color-bg:          #FAF9F5;
    --color-surface:     #FFFFFF;
    --color-ink-900:     #1B2420;
    --color-ink-600:     #55625A;
    --color-ink-400:     #8A968E;
    --color-border:      #E3E4DE;
    --color-danger:      #B3402B;

    --font-display: 'Fraunces', Georgia, serif;
    --font-body: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;

    --radius-sm: 8px;
    --radius-md: 12px;
    --radius-lg: 18px;

    --shadow-card: 0 1px 2px rgba(17, 24, 20, 0.04), 0 16px 40px rgba(17, 24, 20, 0.10);
    --transition: 160ms ease;
}

*{ margin:0; padding:0; box-sizing:border-box; }

body{
    font-family: var(--font-body);
    background: var(--color-bg);
    color: var(--color-ink-900);
    min-height: 100vh;
    line-height: 1.5;
}

.container{
    width: 100%;
    max-width: 1080px;
    margin: 0 auto;
    padding: 40px 20px 60px;
    display: flex;
    flex-direction: column;
    min-height: 100vh;
}

/* ---------- Header ---------- */
.page-header{
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 24px;
    margin-bottom: 48px;
    flex-wrap: wrap;
}

.brand{ display: flex; align-items: center; gap: 14px; }

.brand a{ display: flex; }

.logo-img{
    width: 42px;
    height: 42px;
    border-radius: 10px;
    background: var(--color-primary-900);
    object-fit: contain;
    padding: 6px;
}

.page-title{
    font-family: var(--font-display);
    font-weight: 600;
    font-size: 1.4rem;
    color: var(--color-ink-900);
}

.page-description{
    font-size: 0.88rem;
    color: var(--color-ink-600);
    margin-top: 2px;
}

.header-nav{ display: flex; gap: 24px; }

.header-nav a{
    font-size: 0.92rem;
    font-weight: 500;
    color: var(--color-ink-600);
    text-decoration: none;
    transition: color var(--transition);
}

.header-nav a:hover{ color: var(--color-primary-700); }

/* ---------- Card ---------- */
.card{
    background: var(--color-surface);
    border: 1px solid var(--color-border);
    border-radius: var(--radius-lg);
    box-shadow: var(--shadow-card);
    padding: 44px 40px;
    width: 100%;
    max-width: 440px;
    margin: 0 auto;
}

.card-heading{
    font-family: var(--font-display);
    font-weight: 600;
    font-size: 1.3rem;
    margin-bottom: 6px;
}

.card-subtitle{
    font-size: 0.9rem;
    color: var(--color-ink-600);
    margin-bottom: 28px;
}

/* ---------- Form ---------- */
.grid{ display: grid; gap: 18px; }

.input-group{ display: flex; flex-direction: column; }

label{
    margin-bottom: 6px;
    font-size: 0.86rem;
    font-weight: 500;
    color: var(--color-ink-900);
}

.field-wrap{ position: relative; }

input{
    width: 100%;
    padding: 12px 14px;
    border: 1px solid var(--color-border);
    border-radius: var(--radius-sm);
    font-size: 0.94rem;
    font-family: var(--font-body);
    color: var(--color-ink-900);
    background: var(--color-surface);
    transition: border-color var(--transition), box-shadow var(--transition);
}

input::placeholder{ color: var(--color-ink-400); }

input:focus{
    outline: none;
    border-color: var(--color-primary-500);
    box-shadow: 0 0 0 3px rgba(31,122,77,0.14);
}

input:focus-visible, button:focus-visible, a:focus-visible{
    outline: 2px solid var(--color-primary-500);
    outline-offset: 2px;
}

.toggle-visibility{
    position: absolute;
    right: 12px;
    top: 50%;
    transform: translateY(-50%);
    background: none;
    border: none;
    padding: 4px;
    cursor: pointer;
    color: var(--color-ink-400);
    display: flex;
    line-height: 0;
    transition: color var(--transition);
}

.toggle-visibility:hover{ color: var(--color-ink-600); }

.input-group.has-error input{ border-color: var(--color-danger); }

.field-error{
    font-size: 0.78rem;
    color: var(--color-danger);
    margin-top: 5px;
    display: none;
}

.input-group.has-error .field-error{ display: block; }

.form-meta-row{
    display: flex;
    align-items: center;
    justify-content: space-between;
    font-size: 0.86rem;
}

.form-meta-row label{
    display: flex;
    align-items: center;
    gap: 8px;
    margin: 0;
    font-weight: 400;
    color: var(--color-ink-600);
}

.form-meta-row input[type="checkbox"]{
    width: 16px;
    height: 16px;
    accent-color: var(--color-primary-500);
}

.form-meta-row a{
    color: var(--color-primary-700);
    font-weight: 500;
    text-decoration: none;
}

.form-meta-row a:hover{ text-decoration: underline; }

button[type="submit"]{
    background: var(--color-primary-900);
    color: #fff;
    border: none;
    padding: 13px;
    border-radius: var(--radius-sm);
    cursor: pointer;
    font-size: 0.96rem;
    font-weight: 600;
    font-family: var(--font-body);
    transition: background var(--transition), transform var(--transition);
    margin-top: 4px;
}

button[type="submit"]:hover{ background: var(--color-primary-700); }
button[type="submit"]:active{ transform: translateY(1px); }

.status-message{
    min-height: 18px;
    font-size: 0.85rem;
    color: var(--color-primary-700);
}

.status-message.is-error{ color: var(--color-danger); }

.text-muted{
    font-size: 0.9rem;
    color: var(--color-ink-600);
    text-align: center;
}

.text-muted a{
    color: var(--color-primary-700);
    font-weight: 600;
    text-decoration: none;
}

.text-muted a:hover{ text-decoration: underline; }

.footer-note{
    text-align: center;
    color: var(--color-ink-400);
    font-size: 0.82rem;
    margin-top: auto;
    padding-top: 40px;
}

/* ---------- Responsive ---------- */
@media (max-width: 600px){
    .page-header{ margin-bottom: 32px; }
    .card{ padding: 32px 24px; }
}

@media (prefers-reduced-motion: reduce){
    *{ transition: none !important; }
}

</style>
</head>
<body>
<div class="container">

    <header class="page-header">
        <div class="brand">
            <a href="index.html"><img src="assets/logo.png" class="logo-img" alt="Zambian Marketplace" /></a>
            <div>
                <h1 class="page-title">Login</h1>
                <p class="page-description">Access your account to manage orders, chat, and shop.</p>
            </div>
        </div>
        <nav class="header-nav">
            <a href="index.html">Home</a>
            <a href="shop.html">Shop</a>
        </nav>
    </header>

    <section class="card">
        <h2 class="card-heading">Welcome back</h2>
        <p class="card-subtitle">Log in to continue to your account.</p>

        <form id="login-form" class="grid" novalidate>
            <div class="input-group" id="group-email">
                <label for="email">Email address</label>
                <input id="email" type="email" placeholder="you@example.com" autocomplete="email" required />
                <span class="field-error">Please enter a valid email address.</span>
            </div>

            <div class="input-group" id="group-password">
                <label for="password">Password</label>
                <div class="field-wrap">
                    <input id="password" type="password" placeholder="••••••••" autocomplete="current-password" required />
                    <button type="button" class="toggle-visibility" data-target="password" aria-label="Show password">
                        <svg width="18" height="18" viewBox="0 0 18 18" fill="none"><path d="M1.5 9C1.5 9 4.5 3.5 9 3.5C13.5 3.5 16.5 9 16.5 9C16.5 9 13.5 14.5 9 14.5C4.5 14.5 1.5 9 1.5 9Z" stroke="currentColor" stroke-width="1.4"/><circle cx="9" cy="9" r="2.25" stroke="currentColor" stroke-width="1.4"/></svg>
                    </button>
                </div>
                <span class="field-error">Please enter your password.</span>
            </div>

            <div class="form-meta-row">
                <label for="remember">
                    <input id="remember" type="checkbox" />
                    Remember me
                </label>
                <a href="forgot-password.html">Forgot password?</a>
            </div>

            <button type="submit" id="submit-btn">Login</button>
            <div id="form-status" class="status-message" aria-live="polite"></div>
            <p class="text-muted">Need an account? <a href="register.html">Register</a></p>
        </form>
    </section>

    <footer class="footer-note">
        Secure access for customers and sellers.
    </footer>
</div>

<script>
    // Password visibility toggle
    document.querySelectorAll(".toggle-visibility").forEach((btn) => {
        btn.addEventListener("click", () => {
            const target = document.getElementById(btn.dataset.target);
            const isHidden = target.type === "password";
            target.type = isHidden ? "text" : "password";
            btn.setAttribute("aria-label", isHidden ? "Hide password" : "Show password");
        });
    });

    // Lightweight inline validation — actual authentication stays in app.js
    const form = document.getElementById("login-form");
    const statusEl = document.getElementById("form-status");

    function setError(groupId, show) {
        document.getElementById(groupId).classList.toggle("has-error", show);
    }

    form.addEventListener("submit", (e) => {
        const email = document.getElementById("email");
        const password = document.getElementById("password");
        let valid = true;

        const emailValid = /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email.value.trim());
        setError("group-email", !emailValid);
        if (!emailValid) valid = false;

        const passwordValid = password.value.length > 0;
        setError("group-password", !passwordValid);
        if (!passwordValid) valid = false;

        if (!valid) {
            e.preventDefault();
            statusEl.textContent = "Please correct the highlighted fields.";
            statusEl.classList.add("is-error");
        } else {
            statusEl.classList.remove("is-error");
            statusEl.textContent = "";
            // Submission itself is handled in app.js
        }
    });
</script>
<script src="app.js"></script>

</body>
</html>
