<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Shop — Zambian Marketplace</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="container">
      <header class="page-header">
        <div class="brand">
          <a href="index.html"><img src="assets/logo.png" class="logo-img" alt="Zambian Marketplace" /></a>
          <div>
            <h1 class="page-title">Shop</h1>
            <p class="page-description">Explore products by category, search for sellers, and view detailed listings.</p>
          </div>
        </div>
        <nav class="header-nav">
          <a href="index.html">Home</a>
          <a href="seller.html">Seller Dashboard</a>
          <a href="cart.html">Cart</a>
          <a href="chat.html">Chat</a>
          <a href="login.html" data-action="logout">Logout</a>
        </nav>
      </header>

      <section class="card" style="margin-bottom: 1.5rem;">
        <h2>Search the marketplace</h2>
        <form id="shop-search-form" class="grid grid-2">
          <div class="input-group">
            <label for="search">Search products, shops, or categories</label>
            <input id="search" type="search" placeholder="Search for maize, soap, bakeries..." />
          </div>
          <div class="input-group" style="align-self: end;">
            <button type="submit">Search</button>
          </div>
        </form>
        <div id="shop-status" class="status-message" aria-live="polite"></div>
      </section>

      <section id="products-grid" class="grid grid-3"></section>

      <footer class="footer-note">
        Keep shopping locally and support Zambian sellers.
      </footer>
    </div>
    <script src="app.js"></script>
  </body>
</html>
