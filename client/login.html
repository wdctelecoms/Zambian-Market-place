<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login — Zambian Marketplace</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="container">
      <header class="page-header">
        <div class="brand">
          <a href="index.html"><img src="../assets/logo.png" class="logo-img" alt="Zambian Marketplace" /></a>
          <div>
            <h1 class="page-title">Login</h1>
            <p class="page-description">Access your account to manage orders, chat, and shop.</p>
          </div>
        </div>
        <nav class="header-nav">
          <a href="index.html">Home</a>
          <a href="shop.html">Shop</a>
        </nav>
      </header>

      <section class="card" style="max-width: 540px; margin: 0 auto;">
        <form id="login-form" class="grid">
          <div class="input-group">
            <label for="email">Email address</label>
            <input id="email" type="email" placeholder="you@example.com" required />
          </div>
          <div class="input-group">
            <label for="password">Password</label>
            <input id="password" type="password" placeholder="••••••••" required />
          </div>
          <button type="submit">Login</button>
          <div id="form-status" class="status-message" aria-live="polite"></div>
          <p class="text-muted" style="margin: 1rem 0 0;">Need an account? <a href="register.html">Register</a></p>
        </form>
      </section>

      <footer class="footer-note">
        Secure access for customers and sellers.
      </footer>
    </div>
    <script src="app.js"></script>
  </body>
</html>
