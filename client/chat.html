<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Chat — Zambian Marketplace</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="container">
      <header class="page-header">
        <div class="brand">
          <a href="index.html"><img src="../assets/logo.png" class="logo-img" alt="Zambian Marketplace" /></a>
          <div>
            <h1 class="page-title">Chat</h1>
            <p class="page-description">Connect with sellers and customers directly, send products, and confirm orders.</p>
          </div>
        </div>
        <nav class="header-nav">
          <a href="index.html">Home</a>
          <a href="shop.html">Shop</a>
          <a href="seller.html">Seller Dashboard</a>
          <a href="cart.html">Cart</a>
          <a href="login.html" data-action="logout">Logout</a>
        </nav>
      </header>

      <section class="chat-layout">
        <aside class="chat-list card">
          <h2>Conversations</h2>
          <div id="conversation-list"></div>
        </aside>

        <section class="chat-panel">
          <div id="chat-thread" class="chat-thread"></div>
          <div id="chat-status" class="status-message" aria-live="polite"></div>
          <div id="typing-indicator" class="typing-indicator" aria-live="polite"></div>
          <div class="chat-toolbar">
            <button type="button" id="chat-image-button" class="button-secondary">Image</button>
            <button type="button" id="chat-voice-button" class="button-secondary">Voice</button>
            <button type="button" id="chat-order-button" class="button-secondary">Order</button>
            <button type="button" id="chat-product-button" class="button-secondary">Product</button>
          </div>
          <form id="chat-form" class="chat-input-row">
            <input id="chat-message" type="text" placeholder="Type a message..." />
            <input id="chat-image" type="file" accept="image/*" hidden />
            <button type="submit">Send</button>
          </form>
        </section>
      </section>

      <footer class="footer-note">
        Use the chat to ask about products, attach orders, and share item details instantly.
      </footer>
    </div>
    <script src="/socket.io/socket.io.js"></script>
    <script src="app.js"></script>
  </body>
</html>
